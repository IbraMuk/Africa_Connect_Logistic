services:
  - type: web
    name: africa-connect-logistic-backend
    runtime: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 5432
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSL
        value: "true"
      - key: FRONTEND_URL
        value: https://africa-connect-logistic-frontend.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: SEQUELIZE_LOGGING
        value: "false"
    healthCheckPath: /

  - type: web
    name: africa-connect-logistic-frontend
    runtime: node
    region: frankfurt
    plan: free
    rootDir: frontend
    buildCommand: npm run build
    startCommand: npx next start -H 0.0.0.0 -p $PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://africa-connect-logistic-backend.onrender.com/api
    healthCheckPath: /
